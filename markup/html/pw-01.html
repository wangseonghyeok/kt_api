<!DOCTYPE html>
<html lang="ko">
    <head>
        <!--#include file="./include/_head.html"-->
        <link rel="stylesheet" type="text/css" href="./assets/css/contents.min.css" />
    </head>

    <body>
        <div id="wrap">
            <div class="kt-auth-modal">
                <div class="kt-auth-main kt-auth-main--scroll">
                    <div class="kt-auth-header">
                        <h1 id="authTitle" class="kt-auth-title">KT API Link</h1>
                        <button type="button" class="kt-auth-close"><span class="blind">닫기</span></button>
                    </div>
                    <div class="kt-auth-content kt-auth-scroll" data-auth-main-tabs>
                        <nav class="kt-auth-tabs" aria-label="아이디 비밀번호 찾기">
                            <ul>
                                <li><a href="#" data-auth-main-tab="id" class="is-active">아이디 찾기</a></li>
                                <li><a href="#" data-auth-main-tab="password">비밀번호 찾기</a></li>
                            </ul>
                        </nav>
                        <ul class="kt-auth-main-panels">
                            <li class="kt-auth-main-panel is-active" data-auth-main-panel="id">
                                <div class="kt-auth-panel" data-auth-panel="id" aria-hidden="false">
                                    <div class="kt-auth-center">
                                        <span
                                            class="kt-auth-center__icon kt-auth-center__icon--id"
                                            aria-hidden="true"
                                        ></span>
                                        <h2>아이디 찾기</h2>
                                        <p>가입 시 등록한 이름과 이메일 주소로 아이디를 찾을 수 있습니다.</p>
                                    </div>
                                    <form class="kt-auth-form">
                                        <div class="kt-field">
                                            <label class="kt-field__label" for="findName"
                                                >이름 <span class="is-required">*</span></label
                                            >
                                            <span class="kt-input-field">
                                                <input
                                                    type="text"
                                                    id="findName"
                                                    class="kt-input kt-input--52"
                                                    placeholder="가입 시 등록한 이름을 입력해 주세요"
                                                />
                                                <span class="kt-input-field__actions"
                                                    ><button
                                                        type="button"
                                                        class="kt-input-field__clear"
                                                        data-clear_input
                                                        aria-controls="findName"
                                                        aria-label="입력값 삭제"
                                                        hidden
                                                        aria-hidden="true"
                                                        tabindex="-1"
                                                    >
                                                        <img
                                                            src="/assets/img/components/ico_delete.svg"
                                                            alt=""
                                                        /></button
                                                ></span>
                                            </span>
                                        </div>
                                        <div class="kt-field">
                                            <label class="kt-field__label" for="findEmail"
                                                >이메일 <span class="is-required">*</span></label
                                            >
                                            <span class="kt-input-field">
                                                <input
                                                    type="email"
                                                    id="findEmail"
                                                    class="kt-input kt-input--52"
                                                    placeholder="your@email.com"
                                                />
                                                <span class="kt-input-field__actions"
                                                    ><button
                                                        type="button"
                                                        class="kt-input-field__clear"
                                                        data-clear_input
                                                        aria-controls="findEmail"
                                                        aria-label="입력값 삭제"
                                                        hidden
                                                        aria-hidden="true"
                                                        tabindex="-1"
                                                    >
                                                        <img
                                                            src="/assets/img/components/ico_delete.svg"
                                                            alt=""
                                                        /></button
                                                ></span>
                                            </span>
                                        </div>
                                    </form>
                                    <div class="kt-auth-actions">
                                        <button class="kt-auth-button">인증번호 발송</button>
                                    </div>
                                </div>
                            </li>
                            <li class="kt-auth-main-panel" data-auth-main-panel="password" hidden aria-hidden="true">
                                <div class="kt-auth-panel">
                                    <div class="kt-auth-center">
                                        <p>텍스트 1</p>
                                    </div>
                                </div>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
            <div id="dim"></div>
        </div>
    </body>
</html>
