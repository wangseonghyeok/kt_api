<!DOCTYPE html>
<html lang="ko">
    <head>
        <!--#include file="./include/_head.html"-->
        <!-- <script src="https://a11y-nvisions.github.io/js/improveAccessibility.js"></script> -->
        <style>
            #guide {
                padding: 2rem;
            }

            #guide > h1 {
                font-size: 2.4rem;
            }

            .element-set {
                padding: 0 20px;
            }

            .element-set * {
                font-size: 1.6rem;
            }

            .element-set + .element-set {
                margin-top: 2rem;
            }

            .element-set p {
                margin-top: 1rem;
            }

            .element-set h2 {
                font-size: 1.8rem;
                margin-top: 1rem;
            }

            .element-cont {
                background: #efefef;
                padding: 2rem;
                margin-top: 1rem;
            }

            .element-cont .grid {
                display: inline-block;
                margin-right: 1rem;
            }
        </style>
    </head>

    <body>
        <div id="wrap">
            <!-- contents -->
            <div class="contents">
                <div class="element-set">
                    <h2>> 팝업</h2>
                    <div class="element-cont">
                        <button
                            type="button"
                            aria-haspopup="dialog"
                            aria-controls="popupAlertExample"
                            class="btn-bg blue"
                            onclick="ui.modal(this)"
                            aria-controls="popupAlertExample"
                        >
                            Alert 팝업 (버튼 1개)
                        </button>
                        <button
                            type="button"
                            aria-haspopup="dialog"
                            aria-controls="popupConfirmExample"
                            class="btn-bg blue"
                            onclick="ui.modal(this)"
                        >
                            Confirm 팝업 (버튼 2개)
                        </button>
                        <button
                            type="button"
                            aria-haspopup="dialog"
                            aria-controls="popupRequest"
                            class="btn-bg blue"
                            onclick="ui.modal(this)"
                        >
                            640px 팝업
                        </button>

                        <button
                            type="button"
                            aria-haspopup="dialog"
                            aria-controls="popupNotice"
                            class="btn-bg blue"
                            onclick="ui.modal(this)"
                        >
                            메인 공지 팝업
                        </button>
                    </div>
                    <!-- 20240214 iframe 팝업용 예시 추가 -->
                    <h2>> iframe 팝업 예시</h2>
                    <div class="element-cont">
                        <!-- iframe 팝업 (사이즈 지정 필) -->
                        <iframe
                            width="314"
                            height="510"
                            style="border: 0"
                            src="popupIframe.html"
                            name="popupframe"
                        ></iframe>
                    </div>
                </div>
            </div>
        </div>
        <!--#include file="./include/_popup_alert.html"-->
        <!--#include file="./include/_popup_notice.html"-->
    </body>
</html>
