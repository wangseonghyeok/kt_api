<!DOCTYPE html>
<html lang="ko">
    <head>
        <!--#include file="./include/_head.html"-->
    </head>

    <body class="kt-user-page">
        <div id="wrap">
            <!--#include file="./include/_header.html"-->
            <main id="contents" class="kt-user-main">
                <section class="kt-user-header">
                    <div class="kt-user-header__title">
                        <h1>정보변경</h1>
                        <span>개인정보 및 비밀번호를 관리합니다.</span>
                    </div>
                    <nav class="kt-user-path" aria-label="현재 위치">
                        <a href="Ma-001.html" class="kt-user-path__home"><span class="blind">Home</span></a>
                        <span class="kt-user-path__separator" aria-hidden="true"></span>
                        <p>My page</p>
                        <span class="kt-user-path__separator" aria-hidden="true"></span>
                        <strong>개인정보 변경</strong>
                    </nav>
                </section>
                <div class="kt-user-shell">
                    <nav class="kt-user-tabs" aria-label="정보변경 메뉴">
                        <ul>
                            <li><a href="#" class="is-active">개인정보 변경</a></li>
                            <li><a href="#">비밀번호 변경</a></li>
                            <li><a href="#">회원탈퇴</a></li>
                        </ul>
                    </nav>
                    <ul>
                        <li>
                            <div class="kt-user-form">
                                <div class="kt-user-title">
                                    <h2>비밀번호 확인</h2>
                                    <p>본인 확인을 위해 비밀번호 확인이 필요합니다.</p>
                                </div>
                                <form class="kt-user-form-body">
                                    <label class="kt-field kt-user-field">
                                        <span class="kt-field__label">비밀번호 <span class="is-required">*</span></span>
                                        <span class="kt-password">
                                            <input
                                                type="password"
                                                id="userPasswordConfirm"
                                                class="kt-input kt-input--52"
                                                placeholder="비밀번호를 입력해 주세요"
                                            />
                                            <span class="kt-password__actions">
                                                <button
                                                    type="button"
                                                    class="kt-input-field__clear kt-password__clear"
                                                    data-clear_input
                                                    aria-controls="userPasswordConfirm"
                                                    aria-label="비밀번호 삭제"
                                                    hidden
                                                >
                                                    <img src="./assets/img/components/ico_delete.svg" alt="" />
                                                </button>
                                                <button
                                                    type="button"
                                                    class="kt-password__toggle"
                                                    data-password_toggle
                                                    data-icon-show="./assets/img/components/ico_eye.svg"
                                                    data-icon-hide="./assets/img/components/ico_eye_off.svg"
                                                    aria-controls="userPasswordConfirm"
                                                    aria-pressed="false"
                                                    aria-label="비밀번호 보기"
                                                >
                                                    <img src="./assets/img/components/ico_eye.svg" alt="" />
                                                </button>
                                            </span>
                                        </span>
                                        <span class="kt-field__message"
                                            >팝업 차단 기능이 활성화된 경우 비밀번호를 변경할 수 없으니, 미리 팝업
                                            차단을 해제해 주세요.</span
                                        >
                                    </label>
                                </form>
                                <div class="kt-user-actions">
                                    <button type="button" class="kt-user-button kt-user-button--secondary">취소</button>
                                    <button type="button" class="kt-user-button kt-user-button--primary">
                                        입력완료
                                    </button>
                                </div>
                            </div>
                        </li>
                        <li>2</li>
                        <li>3</li>
                    </ul>
                </div>
            </main>
            <!--#include file="./include/_footer.html"-->
        </div>
    </body>
</html>
