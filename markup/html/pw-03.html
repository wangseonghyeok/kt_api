<!DOCTYPE html>

    <head>

    <body>

                    </div>
                    <div class="kt-auth-content kt-auth-scroll">
                        <nav class="kt-auth-tabs" aria-label="아이디 비밀번호 찾기">
                            <a href="#" class="is-active">아이디 찾기</a>
                            <a href="#" class="">비밀번호 찾기</a>

                                    <dt>가입일</dt>

                                </dl>
                            </div>
                            <div class="kt-auth-actions">
                                <div class="kt-auth-button-row">
                                    <button class="kt-auth-button kt-auth-button--secondary">비밀번호 찾기</button
                                    ><button class="kt-auth-button">로그인</button>

                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div id="dim"></div>
        </div>
