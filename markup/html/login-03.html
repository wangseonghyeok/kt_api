<!DOCTYPE html>
<html lang="ko">
    <head>
        <!--#include file="./include/_head.html"-->
        <link rel="stylesheet" type="text/css" href="./assets/css/contents.min.css" />
    </head>

    <body>
        <div id="wrap">
            <div class="kt-auth-modal">
                <div class="kt-auth-main kt-auth-main--scroll">
                    <div class="kt-auth-header">
                        <h1 id="authTitle" class="kt-auth-title">KT API Link</h1>
                        <button type="button" class="kt-auth-close"><span class="blind">닫기</span></button>
                    </div>
                    <div class="kt-auth-content kt-auth-content--steps kt-auth-scroll">
                        <div class="kt-auth-top">
                            <nav class="kt-auth-tabs" aria-label="로그인 메뉴">
                                <a href="#" class="is-active">로그인</a>
                                <a href="#">회원가입</a>
                            </nav>
                            <ol class="kt-auth-step" aria-label="로그인 단계">
                                <li class="kt-auth-step__item is-current">
                                    <span class="kt-auth-step__num">01</span><span>인증</span>
                                </li>
                                <li class="kt-auth-step__line" aria-hidden="true"></li>
                                <li class="kt-auth-step__item">
                                    <span class="kt-auth-step__num">02</span><span>OTP 인증</span>
                                </li>
                            </ol>
                            <div>
                                <h2 class="kt-auth-section-title">인증 방식 선택</h2>
                                <div class="kt-auth-methods">
                                    <a href="#" class="kt-auth-method"
                                        ><i class="kt-auth-icon--kt"></i><strong>Entra ID</strong
                                        ><span>Kt 직원</span></a
                                    >
                                    <a href="#" class="kt-auth-method"
                                        ><i class="kt-auth-icon--shield"></i><strong>LDAP</strong
                                        ><span>사내 임직원</span></a
                                    >
                                    <a href="#" class="kt-auth-method is-active"
                                        ><i class="kt-auth-icon--users"></i><strong>ID/PWD</strong
                                        ><span>일반 개발자</span></a
                                    >
                                </div>
                            </div>
                        </div>

                        <div class="kt-auth-panel">
                            <form class="kt-auth-form">
                                <!-- .error 표시-->
                                <div class="kt-field error">
                                    <label class="kt-field__label" for="loginId"
                                        >아이디 <span class="is-required">*</span></label
                                    >
                                    <span class="kt-input-field">
                                        <input type="text" id="loginId" class="kt-input kt-input--52" value="kimkt" />
                                        <span class="kt-input-field__actions">
                                            <button
                                                type="button"
                                                class="kt-input-field__clear"
                                                data-clear_input
                                                aria-controls="loginId"
                                                aria-label="입력값 삭제"
                                                hidden
                                                aria-hidden="true"
                                                tabindex="-1"
                                            >
                                                <img src="/assets/img/components/ico_delete.svg" alt="" />
                                            </button>
                                        </span>
                                    </span>
                                    <p class="kt-field__message">사용자 아이디를 입력해주세요.</p>
                                </div>
                                <div class="kt-field error">
                                    <label class="kt-field__label" for="loginPw"
                                        >비밀번호 <span class="is-required">*</span></label
                                    >
                                    <span class="kt-password">
                                        <input
                                            type="password"
                                            id="loginPw"
                                            class="kt-input kt-input--52"
                                            value="password"
                                        />
                                        <span class="kt-password__actions">
                                            <button
                                                type="button"
                                                class="kt-input-field__clear kt-password__clear"
                                                data-clear_input
                                                aria-controls="loginPw"
                                                aria-label="비밀번호 삭제"
                                                hidden
                                                aria-hidden="true"
                                                tabindex="-1"
                                            >
                                                <img src="/assets/img/components/ico_delete.svg" alt="" />
                                            </button>
                                            <button
                                                type="button"
                                                class="kt-password__toggle"
                                                data-password_toggle
                                                aria-controls="loginPw"
                                                aria-label="비밀번호 보기"
                                                data-icon-show="/assets/img/components/ico_eye.svg"
                                                data-icon-hide="/assets/img/components/ico_eye_off.svg"
                                            >
                                                <img src="/assets/img/components/ico_eye.svg" alt="" />
                                            </button>
                                        </span>
                                    </span>
                                    <p class="kt-field__message">비밀번호가 맞지 않습니다.</p>
                                </div>
                            </form>
                            <div class="kt-auth-actions">
                                <button class="kt-auth-button" disabled>다음단계 (OTP 인증)</button>
                                <div class="kt-auth-text-links">
                                    <a href="#">아이디 찾기</a><span aria-hidden="true"></span
                                    ><a href="#">비밀번호 찾기</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div id="dim"></div>
        </div>
    </body>
</html>
