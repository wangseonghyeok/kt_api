<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, viewport-fit=cover" />
        <meta http-equiv="X-UA-compatible" content="IE=edge" />
        <meta name="author" content="KT API Link" />
        <link rel="stylesheet" type="text/css" href="../assets/css/lib/jquery-ui.css" />
        <link rel="stylesheet" type="text/css" href="../assets/css/lib/swiper.min.css" />
        <link rel="stylesheet" type="text/css" href="../assets/css/common.min.css" />
        <link rel="stylesheet" type="text/css" href="../assets/css/contents.min.css" />
        <script src="../assets/js/lib/jquery-3.6.0.min.js"></script>
        <script src="../assets/js/lib/jquery-ui.js"></script>
        <script src="../assets/js/lib/swiper.min.js"></script>
        <script src="../assets/js/common.js"></script>
        <title>KT API Link</title>
    </head>

    <body class="kt-auth-page">
        <div id="wrap">
            <main id="contents" class="kt-auth-main">
                <section class="kt-auth-modal" aria-labelledby="authTitle">
                    <header class="kt-auth-header">
                        <h1 id="authTitle" class="kt-auth-title">KT API Link</h1>
                        <button type="button" class="kt-auth-close"><span class="blind">닫기</span></button>
                    </header>
                    <div class="kt-auth-content">
                        <div class="kt-auth-top">
                            <nav class="kt-auth-tabs" aria-label="로그인 메뉴">
                                <a href="login-01.html" class="is-active">로그인</a>
                                <a href="signup-01.html">회원가입</a>
                            </nav>
                            <ol class="kt-auth-step" aria-label="로그인 단계">
                                <li class="kt-auth-step__item is-current"><span class="kt-auth-step__num">01</span><span>인증</span></li>
                                <li class="kt-auth-step__line" aria-hidden="true"></li>
                                <li class="kt-auth-step__item"><span class="kt-auth-step__num">02</span><span>OTP 인증</span></li>
                            </ol>
                            <div>
                                <h2 class="kt-auth-section-title">인증 방식 선택</h2>
                                <div class="kt-auth-methods">
                                    <a href="login-01.html" class="kt-auth-method"><i class="kt-auth-icon--kt"></i><strong>Entra ID</strong><span>Kt 직원</span></a>
                                    <a href="login-02.html" class="kt-auth-method"><i class="kt-auth-icon--shield"></i><strong>LDAP</strong><span>사내 임직원</span></a>
                                    <a href="login-03.html" class="kt-auth-method is-active"><i class="kt-auth-icon--users"></i><strong>ID/PWD</strong><span>일반 개발자</span></a>
                                </div>
                            </div>
                        </div>

                        <div class="kt-auth-panel">
                            <form class="kt-auth-form">
                                <div class="kt-auth-field">
                                    <label for="loginId">아이디 <span class="is-required">*</span></label>
                                    <span class="kt-input-field">
                                        <input type="text" id="loginId" class="kt-input" value="kimkt" />
                                        <span class="kt-input-field__actions">
                                            <button type="button" class="kt-input-field__clear" data-clear_input aria-controls="loginId" aria-label="입력값 삭제" hidden aria-hidden="true" tabindex="-1"><img src="../assets/img/components/ico_delete.svg" alt="" /></button>
                                        </span>
                                    </span>
                                </div>
                                <div class="kt-auth-field">
                                    <label for="loginPw">비밀번호 <span class="is-required">*</span></label>
                                    <span class="kt-password">
                                        <input type="password" id="loginPw" class="kt-input" value="password" />
                                        <span class="kt-password__actions">
                                            <button type="button" class="kt-input-field__clear kt-password__clear" data-clear_input aria-controls="loginPw" aria-label="비밀번호 삭제" hidden aria-hidden="true" tabindex="-1"><img src="../assets/img/components/ico_delete.svg" alt="" /></button>
                                            <button type="button" class="kt-password__toggle" data-password_toggle aria-controls="loginPw" aria-label="비밀번호 보기" data-icon-show="../assets/img/components/ico_eye.svg" data-icon-hide="../assets/img/components/ico_eye_off.svg"><img src="../assets/img/components/ico_eye.svg" alt="" /></button>
                                        </span>
                                    </span>
                                </div>
                            </form>
                            <div class="kt-auth-actions">
                                <a href="otp-01.html" class="kt-auth-button">다음단계 (OTP 인증)</a>
                                <div class="kt-auth-text-links">
                                    <a href="id/pw-01.html">아이디 찾기</a><span aria-hidden="true"></span><a href="id/pw-04.html">비밀번호 찾기</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            </main>
        </div>
    </body>
</html>
