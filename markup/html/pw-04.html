<!DOCTYPE html>
<html lang="ko">
    <head>
        <!--#include file="./include/_head.html"-->
        <link rel="stylesheet" type="text/css" href="./assets/css/contents.min.css" />
    </head>

    <body>
        <div id="wrap">
            <div class="kt-auth-modal">
                <div class="kt-auth-main kt-auth-main--scroll">
                    <div class="kt-auth-header">
                        <h1 id="authTitle" class="kt-auth-title">KT API Link</h1>
                        <button type="button" class="kt-auth-close"><span class="blind">닫기</span></button>
                    </div>
                    <div class="kt-auth-content kt-auth-scroll">
                        <nav class="kt-auth-tabs" aria-label="아이디 비밀번호 찾기">
                            <a href="#" class="">아이디 찾기</a>
                            <a href="#" class="is-active">비밀번호 찾기</a>
                        </nav>
                        <div class="kt-auth-panel" data-auth-panel="password" aria-hidden="false">
                            <div class="kt-auth-center">
                                <span class="kt-auth-center__icon kt-auth-center__icon--lock" aria-hidden="true"></span>
                                <h2>비밀번호 찾기</h2>
                                <p>가입 시 등록한 정보를 입력하면 해당 이메일로 인증번호가 발송됩니다.</p>
                            </div>
                            <form class="kt-auth-form">
                                <div class="kt-field">
                                    <label class="kt-field__label" for="resetName"
                                        >이름 <span class="is-required">*</span></label
                                    >
                                    <span class="kt-input-field">
                                        <input
                                            type="text"
                                            id="resetName"
                                            class="kt-input kt-input--52"
                                            placeholder="가입 시 등록한 이름을 입력해 주세요"
                                        />
                                        <span class="kt-input-field__actions"
                                            ><button
                                                type="button"
                                                class="kt-input-field__clear"
                                                data-clear_input
                                                aria-controls="resetName"
                                                aria-label="입력값 삭제"
                                                hidden
                                                aria-hidden="true"
                                                tabindex="-1"
                                            >
                                                <img src="/assets/img/components/ico_delete.svg" alt="" /></button
                                        ></span>
                                    </span>
                                </div>
                                <div class="kt-field">
                                    <label class="kt-field__label" for="resetEmail"
                                        >이메일 <span class="is-required">*</span></label
                                    >
                                    <span class="kt-input-field">
                                        <input
                                            type="email"
                                            id="resetEmail"
                                            class="kt-input kt-input--52"
                                            placeholder="your@email.com"
                                        />
                                        <span class="kt-input-field__actions"
                                            ><button
                                                type="button"
                                                class="kt-input-field__clear"
                                                data-clear_input
                                                aria-controls="resetEmail"
                                                aria-label="입력값 삭제"
                                                hidden
                                                aria-hidden="true"
                                                tabindex="-1"
                                            >
                                                <img src="/assets/img/components/ico_delete.svg" alt="" /></button
                                        ></span>
                                    </span>
                                </div>
                                <div class="kt-field">
                                    <label class="kt-field__label" for="resetId"
                                        >아이디 <span class="is-required">*</span></label
                                    >
                                    <span class="kt-input-field">
                                        <input
                                            type="text"
                                            id="resetId"
                                            class="kt-input kt-input--52"
                                            placeholder="아이디를 입력해 주세요"
                                        />
                                        <span class="kt-input-field__actions"
                                            ><button
                                                type="button"
                                                class="kt-input-field__clear"
                                                data-clear_input
                                                aria-controls="resetId"
                                                aria-label="입력값 삭제"
                                                hidden
                                                aria-hidden="true"
                                                tabindex="-1"
                                            >
                                                <img src="/assets/img/components/ico_delete.svg" alt="" /></button
                                        ></span>
                                    </span>
                                </div>
                            </form>
                            <div class="kt-auth-actions">
                                <div class="kt-auth-button-row">
                                    <button class="kt-auth-button kt-auth-button--secondary">이전</button
                                    ><button class="kt-auth-button">인증번호 발송</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div id="dim"></div>
        </div>
    </body>
</html>
