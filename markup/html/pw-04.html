<!DOCTYPE html>
<html lang="ko">
    <head>
        <!--#include file="./include/_head.html"-->
        <link rel="stylesheet" type="text/css" href="./assets/css/contents.min.css" />
    </head>

    <body>
        <div id="wrap">
            <!--#include file="./include/_header.html"-->
            <div class="kt-auth-modal">
                <section class="kt-auth-modal">
                    <header class="kt-auth-header">
                        <h1 id="authTitle" class="kt-auth-title">KT API Link</h1>
                        <button type="button" class="kt-auth-close"><span class="blind">닫기</span></button>
                    </header>
                    <div class="kt-auth-content">
                        <nav class="kt-auth-tabs" aria-label="아이디 비밀번호 찾기">
                            <a href="pw-01.html">아이디 찾기</a>
                            <a href="pw-04.html" class="is-active">비밀번호 찾기</a>
                        </nav>
                        <div class="kt-auth-panel">
                            <div class="kt-auth-center">
                                <span class="kt-auth-center__icon kt-auth-center__icon--lock" aria-hidden="true"></span>
                                <h2>비밀번호 찾기</h2>
                                <p>가입 정보 확인 후 비밀번호를 다시 설정할 수 있습니다.</p>
                            </div>
                            <form class="kt-auth-form">
                                <div class="kt-auth-field">
                                    <label for="resetName">이름 <span class="is-required">*</span></label>
                                    <span class="kt-input-field">
                                        <input
                                            type="text"
                                            id="resetName"
                                            class="kt-input"
                                            placeholder="가입 시 등록한 이름을 입력해 주세요"
                                        />
                                        <span class="kt-input-field__actions">
                                            <button
                                                type="button"
                                                class="kt-input-field__clear"
                                                data-clear_input
                                                aria-controls="resetName"
                                                aria-label="입력값 삭제"
                                                hidden
                                                aria-hidden="true"
                                                tabindex="-1"
                                            >
                                                <img src="/assets/img/components/ico_delete.svg" alt="" />
                                            </button>
                                        </span>
                                    </span>
                                </div>
                                <div class="kt-auth-field">
                                    <label for="resetId">아이디 <span class="is-required">*</span></label>
                                    <span class="kt-input-field">
                                        <input
                                            type="text"
                                            id="resetId"
                                            class="kt-input"
                                            placeholder="아이디를 입력해 주세요"
                                        />
                                        <span class="kt-input-field__actions">
                                            <button
                                                type="button"
                                                class="kt-input-field__clear"
                                                data-clear_input
                                                aria-controls="resetId"
                                                aria-label="입력값 삭제"
                                                hidden
                                                aria-hidden="true"
                                                tabindex="-1"
                                            >
                                                <img src="/assets/img/components/ico_delete.svg" alt="" />
                                            </button>
                                        </span>
                                    </span>
                                </div>
                                <div class="kt-auth-field">
                                    <label for="resetEmail">이메일 <span class="is-required">*</span></label>
                                    <span class="kt-input-field">
                                        <input
                                            type="email"
                                            id="resetEmail"
                                            class="kt-input"
                                            placeholder="your@email.com"
                                        />
                                        <span class="kt-input-field__actions">
                                            <button
                                                type="button"
                                                class="kt-input-field__clear"
                                                data-clear_input
                                                aria-controls="resetEmail"
                                                aria-label="입력값 삭제"
                                                hidden
                                                aria-hidden="true"
                                                tabindex="-1"
                                            >
                                                <img src="/assets/img/components/ico_delete.svg" alt="" />
                                            </button>
                                        </span>
                                    </span>
                                </div>
                            </form>
                            <div class="kt-auth-actions">
                                <div class="kt-auth-button-row">
                                    <a href="pw-01.html" class="kt-auth-button kt-auth-button--secondary"
                                        >아이디 먼저 찾기</a
                                    >
                                    <a href="pw-05.html" class="kt-auth-button">인증번호 발송</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
            <!--#include file="./include/_footer.html"-->
        </div>
    </body>
</html>
