<!DOCTYPE html>
<html lang="ko">
    <head>
        <!--#include file="./include/_head.html"-->
        <link rel="stylesheet" type="text/css" href="./assets/css/contents.min.css" />
    </head>

    <body>
        <div id="wrap">
            <div class="kt-auth-modal">
                <div class="kt-auth-main kt-auth-main--scroll">
                    <div class="kt-auth-header">
                        <h1 id="authTitle" class="kt-auth-title">KT API Link</h1>
                        <button type="button" class="kt-auth-close"><span class="blind">닫기</span></button>
                    </div>
                    <div class="kt-auth-content kt-auth-scroll" data-auth-main-tabs>
                        <nav class="kt-auth-tabs" aria-label="아이디 비밀번호 찾기">
                            <ul>
                                <li><a href="#" data-auth-main-tab="id">아이디 찾기</a></li>
                                <li><a href="#" data-auth-main-tab="password" class="is-active">비밀번호 찾기</a></li>
                            </ul>
                        </nav>
                        <ul class="kt-auth-main-panels">
                            <li class="kt-auth-main-panel is-active" data-auth-main-panel="password">
                                <div class="kt-auth-panel" data-auth-panel="password" aria-hidden="false">
                                    <div class="kt-auth-center">
                                        <span
                                            class="kt-auth-center__icon kt-auth-center__icon--reset"
                                            aria-hidden="true"
                                        ></span>
                                        <h2>비밀번호 재설정</h2>
                                        <p>사용할 새 비밀번호를 입력해주세요.</p>
                                    </div>
                                    <form class="kt-auth-form">
                                        <div class="kt-field">
                                            <label class="kt-field__label" for="newPw"
                                                >새 비밀번호 <span class="is-required">*</span></label
                                            >
                                            <span class="kt-password">
                                                <input
                                                    type="password"
                                                    id="newPw"
                                                    class="kt-input kt-input--52"
                                                    placeholder="새 비밀번호를 입력해 주세요."
                                                />
                                                <span class="kt-password__actions">
                                                    <button
                                                        type="button"
                                                        class="kt-input-field__clear kt-password__clear"
                                                        data-clear_input
                                                        aria-controls="newPw"
                                                        aria-label="비밀번호 삭제"
                                                        hidden
                                                        aria-hidden="true"
                                                        tabindex="-1"
                                                    >
                                                        <img src="/assets/img/components/ico_delete.svg" alt="" />
                                                    </button>
                                                    <button
                                                        type="button"
                                                        class="kt-password__toggle"
                                                        data-password_toggle
                                                        aria-controls="newPw"
                                                        aria-label="비밀번호 보기"
                                                        data-icon-show="/assets/img/components/ico_eye.svg"
                                                        data-icon-hide="/assets/img/components/ico_eye_off.svg"
                                                    >
                                                        <img src="/assets/img/components/ico_eye_off.svg" alt="" />
                                                    </button>
                                                </span>
                                            </span>
                                        </div>
                                        <div class="kt-field">
                                            <label class="kt-field__label" for="newPwConfirm"
                                                >새 비밀번호 확인 <span class="is-required">*</span></label
                                            >
                                            <span class="kt-password">
                                                <input
                                                    type="password"
                                                    id="newPwConfirm"
                                                    class="kt-input kt-input--52"
                                                    placeholder="새 비밀번호를 재입력해 주세요."
                                                />
                                                <span class="kt-password__actions">
                                                    <button
                                                        type="button"
                                                        class="kt-input-field__clear kt-password__clear"
                                                        data-clear_input
                                                        aria-controls="newPwConfirm"
                                                        aria-label="비밀번호 삭제"
                                                        hidden
                                                        aria-hidden="true"
                                                        tabindex="-1"
                                                    >
                                                        <img src="/assets/img/components/ico_delete.svg" alt="" />
                                                    </button>
                                                    <button
                                                        type="button"
                                                        class="kt-password__toggle"
                                                        data-password_toggle
                                                        aria-controls="newPwConfirm"
                                                        aria-label="비밀번호 보기"
                                                        data-icon-show="/assets/img/components/ico_eye.svg"
                                                        data-icon-hide="/assets/img/components/ico_eye_off.svg"
                                                    >
                                                        <img src="/assets/img/components/ico_eye_off.svg" alt="" />
                                                    </button>
                                                </span>
                                            </span>
                                        </div>
                                    </form>
                                    <div class="kt-auth-note">
                                        <ul class="kt-auth-note-list">
                                            <li>
                                                8자 이상이면서, 영문 대문자, 숫자, 특수문자(!@#$%^&*)를 모두 포함하세요.
                                            </li>
                                        </ul>
                                    </div>
                                    <div class="kt-auth-actions">
                                        <div class="kt-auth-button-row">
                                            <button class="kt-auth-button">비밀번호 변경 완료</button>
                                        </div>
                                    </div>
                                </div>
                            </li>
                            <li class="kt-auth-main-panel" data-auth-main-panel="id" hidden aria-hidden="true">
                                <div class="kt-auth-panel">
                                    <div class="kt-auth-center">
                                        <p>텍스트 1</p>
                                    </div>
                                </div>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
            <div id="dim"></div>
        </div>
    </body>
</html>
