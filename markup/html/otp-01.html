<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, viewport-fit=cover" />
        <meta http-equiv="X-UA-compatible" content="IE=edge" />
        <meta name="author" content="KT API Link" />
        <link rel="stylesheet" type="text/css" href="../assets/css/lib/jquery-ui.css" />
        <link rel="stylesheet" type="text/css" href="../assets/css/lib/swiper.min.css" />
        <link rel="stylesheet" type="text/css" href="../assets/css/common.min.css" />
        <link rel="stylesheet" type="text/css" href="../assets/css/contents.min.css" />
        <script src="../assets/js/lib/jquery-3.6.0.min.js"></script>
        <script src="../assets/js/lib/jquery-ui.js"></script>
        <script src="../assets/js/lib/swiper.min.js"></script>
        <script src="../assets/js/common.js"></script>
        <title>KT API Link</title>
    </head>

    <body class="kt-auth-page">
        <div id="wrap">
            <main id="contents" class="kt-auth-main">
                <section class="kt-auth-modal" aria-labelledby="authTitle">
                    <header class="kt-auth-header">
                        <h1 id="authTitle" class="kt-auth-title">KT API Link</h1>
                        <button type="button" class="kt-auth-close"><span class="blind">닫기</span></button>
                    </header>
                    <div class="kt-auth-content">
                        <div class="kt-auth-top">
                            <nav class="kt-auth-tabs" aria-label="로그인 메뉴">
                                <a href="login-01.html" class="is-active">로그인</a>
                                <a href="signup-01.html">회원가입</a>
                            </nav>
                            <ol class="kt-auth-step" aria-label="로그인 단계">
                                <li class="kt-auth-step__item is-done"><span class="kt-auth-step__num">01</span><span>인증</span></li>
                                <li class="kt-auth-step__line" aria-hidden="true"></li>
                                <li class="kt-auth-step__item is-current"><span class="kt-auth-step__num">02</span><span>OTP 인증</span></li>
                            </ol>
                        </div>
                        <div class="kt-auth-panel">
                            <div class="kt-auth-center">
                                <span class="kt-auth-center__icon kt-auth-center__icon--otp" aria-hidden="true"></span>
                                <h2>OTP 인증 코드 입력</h2>
                                <p>이메일로 발송된 6자리 코드를 입력해 주세요.</p>
                            </div>
                            <form class="kt-auth-form">
                                <div class="kt-auth-field is-error kt-auth-verify">
                                    <label for="otpCode">인증번호 <span class="is-required">*</span></label>
                                    <input type="text" id="otpCode" class="kt-input is-error" value="123456" inputmode="numeric" />
                                    <span class="kt-auth-verify__side">
                                        <span class="kt-auth-timer">02:23</span>
                                        <button type="button" class="kt-auth-resend">재전송</button>
                                    </span>
                                    <p class="kt-auth-helper">인증 코드가 올바르지 않습니다. 다시 확인해 주세요.</p>
                                </div>
                            </form>
                            <div class="kt-auth-actions">
                                <div class="kt-auth-button-row">
                                    <a href="login-03.html" class="kt-auth-button kt-auth-button--secondary">이전</a>
                                    <a href="Ma-001.html" class="kt-auth-button">로그인</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            </main>
        </div>
    </body>
</html>
