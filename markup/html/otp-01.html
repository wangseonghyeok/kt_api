<!DOCTYPE html>
<html lang="ko">
    <head>
        <!--#include file="./include/_head.html"-->
        <link rel="stylesheet" type="text/css" href="./assets/css/contents.min.css" />
    </head>

    <body>
        <div id="wrap">
            <div class="kt-auth-modal">
                <div class="kt-auth-main">
                    <div class="kt-auth-header">
                        <h1 id="authTitle" class="kt-auth-title">KT API Link</h1>
                        <button type="button" class="kt-auth-close"><span class="blind">닫기</span></button>
                    </div>
                    <div class="kt-auth-content kt-auth-content--steps">
                        <div class="kt-auth-top">
                            <nav class="kt-auth-tabs" aria-label="로그인 메뉴">
                                <a href="#" class="is-active">로그인</a>
                                <a href="#">회원가입</a>
                            </nav>
                            <ol class="kt-auth-step" aria-label="로그인 단계">
                                <li class="kt-auth-step__item is-done">
                                    <span class="kt-auth-step__num">01</span><span>인증</span>
                                </li>
                                <li class="kt-auth-step__line" aria-hidden="true"></li>
                                <li class="kt-auth-step__item is-current">
                                    <span class="kt-auth-step__num">02</span><span>OTP 인증</span>
                                </li>
                            </ol>
                        </div>
                        <div class="kt-auth-panel">
                            <div class="kt-auth-center">
                                <span class="kt-auth-center__icon kt-auth-center__icon--otp" aria-hidden="true"></span>
                                <h2>OTP 인증 코드 입력</h2>
                                <p>이메일로 발송된 6자리 코드를 입력해 주세요.</p>
                            </div>
                            <form class="kt-auth-form">
                                <div class="kt-field error kt-auth-verify">
                                    <label class="kt-field__label" for="otpCode"
                                        >인증번호 <span class="is-required">*</span></label
                                    >
                                    <input
                                        type="text"
                                        id="otpCode"
                                        class="kt-input kt-input--52"
                                        value="123456"
                                        inputmode="numeric"
                                    />
                                    <span class="kt-auth-verify__side">
                                        <span class="kt-auth-timer">02:23</span>
                                        <button type="button" class="kt-auth-resend">재전송</button>
                                    </span>
                                    <p class="kt-field__message">인증 코드가 올바르지 않습니다. 다시 확인해 주세요.</p>
                                </div>
                            </form>
                            <div class="kt-auth-actions">
                                <div class="kt-auth-button-row">
                                    <button class="kt-auth-button kt-auth-button--secondary">이전</button>
                                    <button class="kt-auth-button">로그인</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div id="dim"></div>
        </div>
    </body>
</html>
