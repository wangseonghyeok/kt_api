                            -> .fc-day에 .fc-day-active 클래스 추가
                            예약 마감 시 
                            -> full calendar 이벤트로 .fc-day-closed 클래스 추가하거나 (calendar.js script 참고)

                                <div class="l-left">
                                    <div class="subtitle-box">
                                        <h3>
                                            <em>STEP 1</em>
                                            날짜 선택

                                            <label for="timeSelect04">
