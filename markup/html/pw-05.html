<!DOCTYPE html>
<html lang="ko">
    <head>
        <!--#include file="./include/_head.html"-->
        <link rel="stylesheet" type="text/css" href="./assets/css/contents.min.css" />
    </head>

    <body>
        <div id="wrap">
            <div class="kt-auth-modal">
                <div class="kt-auth-main kt-auth-main--scroll">
                    <div class="kt-auth-header">
                        <h1 id="authTitle" class="kt-auth-title">KT API Link</h1>
                        <button type="button" class="kt-auth-close"><span class="blind">닫기</span></button>
                    </div>
                    <div class="kt-auth-content kt-auth-scroll">
                        <nav class="kt-auth-tabs" aria-label="아이디 비밀번호 찾기">
                            <a href="#" class="">아이디 찾기</a>
                            <a href="#" class="is-active">비밀번호 찾기</a>
                        </nav>
                        <div class="kt-auth-panel" data-auth-panel="password" aria-hidden="false">
                            <div class="kt-auth-center">
                                <span class="kt-auth-center__icon kt-auth-center__icon--mail" aria-hidden="true"></span>
                                <h2>이메일 인증</h2>
                                <p>이메일로 발송된 인증번호 6자리를 입력해주세요.</p>
                            </div>
                            <form class="kt-auth-form">
                                <div class="kt-field kt-auth-verify">
                                    <label class="kt-field__label" for="resetCode"
                                        >인증번호 <span class="is-required">*</span></label
                                    ><input
                                        type="text"
                                        id="resetCode"
                                        class="kt-input kt-input--52"
                                        value="123456"
                                        inputmode="numeric"
                                    /><span class="kt-auth-verify__side"
                                        ><span class="kt-auth-timer">02:23</span
                                        ><button type="button" class="kt-auth-resend">재전송</button></span
                                    >
                                    <p class="kt-field__message kt-field__message--complete">
                                        인증 번호가 확인되었습니다.
                                    </p>
                                </div>
                            </form>
                            <div class="kt-auth-actions">
                                <div class="kt-auth-button-row">
                                    <button class="kt-auth-button kt-auth-button--secondary">이전</button
                                    ><button class="kt-auth-button">인증 확인</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div id="dim"></div>
        </div>
    </body>
</html>
